name: GitHub-Metrics

on:
  schedule:
    - cron: "30 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: ${{ github.repository_owner }}
          filename: metrics/overview.svg
          config_timezone: Asia/Shanghai
          config_display: large
          config_output: svg
          config_animations: yes
          template: classic
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          repositories_forks: no
          output_action: commit
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          committer_branch: ${{ github.ref_name }}
          committer_message: "chore: update profile metrics"
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_threshold: 2%
          plugin_languages_skipped: |
            cs336
            cs224
            CS61A
            CS61B
            CS61C
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes
          plugin_repositories: yes
          plugin_repositories_featured: kevin258258/tensorfieldx, kevin258258/My-minimind, kevin258258/sustech-course-solver
